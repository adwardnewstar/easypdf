          : "assets/icon/unlock.svg";
        lockIcon.alt = locked ? "锁定" : "开锁";

        // 控制工具栏显示/隐藏
        const topBar = document.getElementById("topBar");

        // 控制提示显示
        if (locked) {
          wasFullscreenBeforeLock = !!document.fullscreenElement;
          if (!wasFullscreenBeforeLock) toggleFullscreen();
          app.classList.add("locked-mode");
          lockBtnEl.classList.add("locked");
          topBar.classList.remove("show");
          topBar.style.transform = ""; // 重置内联样式，确保CSS类生效
          console.log("进入锁定模式：双击屏幕可打开/关闭坐标系");
        } else {
          if (document.fullscreenElement && !wasFullscreenBeforeLock) {
            toggleFullscreen();
          } else if (!document.fullscreenElement && wasFullscreenBeforeLock) {
            toggleFullscreen();
          }
          app.classList.remove("locked-mode");
          lockBtnEl.classList.remove("locked");
          topBar.style.transform = ""; // 重置内联样式，确保CSS类生效
          topBar.classList.add("show");

          // 解锁状态下保持网格状态不变
          console.log("解锁状态：网格状态保持不变");
        }
      }

      // ==================== 全屏 ====================
      let isFullscreen = false;
      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      }
      document.addEventListener("fullscreenchange", () => {
        isFullscreen = !!document.fullscreenElement;
        const fullscreenIcon = fullscreenBtn.querySelector("img");
        fullscreenIcon.src = isFullscreen
          ? "assets/icon/reset.svg"
          : "assets/icon/fullscreen.svg";
        fullscreenIcon.alt = isFullscreen ? "还原" : "全屏";

        // 确保工具栏在全屏状态下仍然正确显示
        const topBar = document.getElementById("topBar");
        if (topBar.classList.contains("show")) {
          // 使用类切换实现动画效果，避免覆盖CSS样式
          topBar.classList.remove("show");
          // 强制重排
          topBar.offsetHeight;
          // 然后显示工具栏，实现从顶部弹出的效果
          topBar.classList.add("show");
        }
      });

      // ==================== 画布交互 ====================
      function onMouseDown(e) {
        if (!offscreenCanvas) return;
        // 不要阻止默认行为，否则会影响双击事件
        // e.preventDefault();
        isDragging = true;
        dragStartX = e.clientX * dpr;
        dragStartY = e.clientY * dpr;
        startOffsetX = offsetX;
        startOffsetY = offsetY;
        canvasArea.style.cursor = "grabbing";

        // 取消长按检测，改为单击语音按钮开启关闭导航视口
        if (longPressTimer) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
      }
      function onMouseMove(e) {
        if (!isDragging || !offscreenCanvas) return;
        e.preventDefault();
        // 取消长按检测
        if (longPressTimer) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
        offsetX = startOffsetX + (e.clientX * dpr - dragStartX);
        offsetY = startOffsetY + (e.clientY * dpr - dragStartY);
        updatePan();
      }
      function onMouseUp() {
        isDragging = false;
        canvasArea.style.cursor = "grab";
        // 取消长按检测
        if (longPressTimer) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
      }
      // 滚轮事件防抖
      let wheelTimeout = null;
      let pendingWheelScale = null;
      let pendingWheelCenter = null;

      function onWheel(e) {
        if (!currentPage || locked) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const cx = (e.clientX - rect.left) * dpr;
        const cy = (e.clientY - rect.top) * dpr;
        const delta = e.deltaY > 0 ? 0.92 : 1.08;

        // 累积缩放比例
        if (pendingWheelScale === null) {
          pendingWheelScale = scale;
          pendingWheelCenter = { x: cx, y: cy };
        }
        pendingWheelScale *= delta;

        // 清除之前的定时器
        if (wheelTimeout) {
          clearTimeout(wheelTimeout);
        }

        // 设置新的定时器，延迟执行缩放
        wheelTimeout = setTimeout(() => {
          if (pendingWheelScale !== null && pendingWheelCenter !== null) {
            scaleAtPoint(
              pendingWheelScale,
              pendingWheelCenter.x,
              pendingWheelCenter.y
            );
            pendingWheelScale = null;
            pendingWheelCenter = null;
          }
          wheelTimeout = null;
        }, 50); // 50ms防抖延迟
      }
      function onTouchStart(e) {
        e.preventDefault();
        const touches = e.touches;
        if (touches.length === 1) {
          const t = touches[0];
          dragStartX = t.clientX * dpr;
          dragStartY = t.clientY * dpr;
          startOffsetX = offsetX;
          startOffsetY = offsetY;
          isDragging = true;
        } else if (touches.length === 2 && !locked) {
          isDragging = false;
          const p1 = {
            x: touches[0].clientX * dpr,
            y: touches[0].clientY * dpr,
          };
          const p2 = {
            x: touches[1].clientX * dpr,
            y: touches[1].clientY * dpr,
          };
          touchStartPoints = [p1, p2];
          touchStartDistance = Math.hypot(p1.x - p2.x, p1.y - p2.y);
          const rect = canvas.getBoundingClientRect();
          const center = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
          touchStartCenter = {
            x: center.x - rect.left * dpr,
            y: center.y - rect.top * dpr,
          };
          touchStartScale = scale;
          touchStartOffsetX = offsetX;
          touchStartOffsetY = offsetY;
        }
      }
      // 触摸移动事件防抖
      let touchMoveTimeout = null;

      function onTouchMove(e) {
        e.preventDefault();
        const touches = e.touches;
        if (touches.length === 1 && isDragging) {
          offsetX = startOffsetX + (touches[0].clientX * dpr - dragStartX);
          offsetY = startOffsetY + (touches[0].clientY * dpr - dragStartY);
          updatePan();
        } else if (touches.length === 2 && touchStartPoints.length && !locked) {
          const p1 = {
            x: touches[0].clientX * dpr,
            y: touches[0].clientY * dpr,
          };
          const p2 = {
            x: touches[1].clientX * dpr,
            y: touches[1].clientY * dpr,
          };
          const curDist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
          const curCenter = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
          const rect = canvas.getBoundingClientRect();
          const cx = curCenter.x - rect.left * dpr;
          const cy = curCenter.y - rect.top * dpr;
          let newScale = touchStartScale * (curDist / touchStartDistance);
          newScale = Math.min(20, Math.max(0.2, newScale));
          const ratio = newScale / touchStartScale;
          offsetX = cx - (touchStartCenter.x - touchStartOffsetX) * ratio;
          offsetY = cy - (touchStartCenter.y - touchStartOffsetY) * ratio;
          scale = newScale;
          updateScaleInput();

          // 使用防抖机制，避免频繁调用 refreshRender
          if (touchMoveTimeout) {
            clearTimeout(touchMoveTimeout);
          }
          touchMoveTimeout = setTimeout(() => {
            refreshRender().then(() => {
              // 检查最佳比例状态
              checkBestScaleStatus();
            });
            touchMoveTimeout = null;
          }, 16); // 约60fps的防抖延迟

          touchStartDistance = curDist;
          touchStartScale = scale;
          touchStartOffsetX = offsetX;
          touchStartOffsetY = offsetY;
          touchStartCenter = { x: cx, y: cy };
        }
      }
      function onTouchEnd(e) {
        if (e?.touches?.length === 0) {
          isDragging = false;
          touchStartPoints = [];
        }
      }

      function onCanvasClick(e) {
        if (pdfDoc && currentPage) return;
        // 检查登录状态
        if (!isLoggedIn) {
          showLoginOverlay();
          return;
        }
        fileInput.click();
      }

      // ==================== 初始化 ====================
      // 更新按钮位置（电脑端响应式）
      function updateButtonPositions() {
        const isMobile = window.innerWidth <= 640;
        if (!isMobile) {
          // 电脑端：锁定按钮中心距离左边缘1/4屏幕宽度，语音按钮中心距离右边缘1/4屏幕宽度
          const lockBtnSize = lockBtnEl.offsetWidth || 66;
          const voiceBtnSize = thumbCard.offsetWidth || 66;
          const leftPosition = window.innerWidth / 4 - lockBtnSize / 2;
          const rightPosition = window.innerWidth / 4 - voiceBtnSize / 2;
          lockBtnEl.style.left = `${Math.max(20, leftPosition)}px`;
          thumbCard.style.right = `${Math.max(20, rightPosition)}px`;
        } else {
          // 移动端：保持原有的靠左靠右位置
          lockBtnEl.style.left = "20px";
          thumbCard.style.right = "20px";
        }
      }

      async function init() {
        // 初始加载时强制设置为未登录状态
        // 等待 WebSocket 请求服务器确认后再更新
        isLoggedIn = false;
        localStorage.setItem("easyPdfAuth", "false");

        // 异步检查认证状态，不阻塞页面初始化
        checkAuthStatus().then(() => {
          // 认证检查完成后加载历史记录
          loadHistory();
        });

        // 初始化按钮位置
        updateButtonPositions();

        // 检查 Session Storage 中是否有临时存储的渲染状态
        const tempState = sessionStorage.getItem("easyPdfTempState");
        if (tempState) {
          try {
            const {
              scale: savedScale,
              offsetX: savedOffsetX,
              offsetY: savedOffsetY,
            } = JSON.parse(tempState);
            scale = savedScale;
            offsetX = savedOffsetX;
            offsetY = savedOffsetY;
          } catch (e) {
            console.error("解析临时状态失败:", e);
          }
        }

        // 登录按钮事件监听
        const loginButton = document.getElementById("loginButton");
        const loginEmail = document.getElementById("loginEmail");
        const loginPassword = document.getElementById("loginPassword");

        if (loginButton) {
          loginButton.addEventListener("click", () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value;
            if (email && password) {
              login(email, password);
            } else {
              document.getElementById("loginError").textContent =
                "请输入账号和密码";
            }
          });

          // 回车键登录
          loginPassword.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
              const email = loginEmail.value.trim();
              const password = loginPassword.value;
              if (email && password) {
                login(email, password);
              } else {
                document.getElementById("loginError").textContent =
                  "请输入账号和密码";
              }
            }
          });
        }

        // 点击登录框外部关闭登录框
        const loginOverlay = document.getElementById("loginOverlay");
        if (loginOverlay) {
          loginOverlay.addEventListener("click", (e) => {
            if (e.target === loginOverlay) {
              hideLoginOverlay();
            }
          });
        }

        // 监听尺寸变化
        const resizeObserver = new ResizeObserver(() => {
          resizeCanvas();
          if (offscreenCanvas) {
            drawCanvas();
          } else {
            drawWelcomeMessage();
          }
        });
        resizeObserver.observe(canvasArea);
        window.addEventListener("resize", () => {
          resizeCanvas();
          updateButtonPositions();
          if (offscreenCanvas) {
            drawCanvas();
          } else {
            drawWelcomeMessage();
          }
        });

        // 绑定画布事件
        canvas.addEventListener("mousedown", onMouseDown);
        window.addEventListener("mousemove", onMouseMove);
        window.addEventListener("mouseup", onMouseUp);
        canvas.addEventListener("wheel", onWheel, { passive: false });
        canvas.addEventListener("touchstart", onTouchStart, { passive: false });
        canvas.addEventListener("touchmove", onTouchMove, { passive: false });
        canvas.addEventListener("touchend", onTouchEnd);

        // 双击锁定/解锁
        // 双击屏幕打开/关闭坐标系（仅在锁定模式下）
        canvas.addEventListener("dblclick", () => {
          if (isLoggedIn) {
            toggleCoordinateSystem();
          }
        });

        // 触屏双击检测
        let lastTouchTime = 0;
        const DOUBLE_TAP_DELAY = 300; // 双击延迟阈值（毫秒）
        canvas.addEventListener("touchstart", (e) => {
          const currentTime = new Date().getTime();
          const tapLength = e.touches.length;

          if (tapLength === 1) {
            if (currentTime - lastTouchTime < DOUBLE_TAP_DELAY) {
              // 检测到双击
              if (isLoggedIn) {
                toggleCoordinateSystem();
                e.preventDefault();
              }
            }
            lastTouchTime = currentTime;
          }
        });

        // 缩放按钮点击事件 - 点击切换导航窗口
        scaleInput.addEventListener("click", () => {
          if (locked) return;
          // 未登录时显示登录框
          if (!isLoggedIn) {
            showLoginOverlay();
            return;
          }
          if (!currentPage) return;
          // 切换导航窗口
          toggleViewportNav();
        });

        // 设置缩放值的方法（供其他地方调用）
        function setScaleValue(value) {
          scaleInput.textContent = `${value.toFixed(1)}%`;
        }

        // 最佳比例按钮 - 双击保存最佳比例，长按重置最佳比例
        let isBestScaleSaved = false; // 标记是否已保存最佳比例
        let bestScaleLongPressTimer = null; // 长按定时器
        const BEST_SCALE_LONG_PRESS_DURATION = 500; // 长按持续时间（毫秒）

        bestScaleBtn.addEventListener("click", async () => {
          if (!isLoggedIn) {
            showLoginOverlay();
            return;
          }
          // 单击无功能
        });

        // 长按重置最佳比例
        bestScaleBtn.addEventListener("mousedown", () => {
          if (locked) return;
          // 清除之前的定时器
          if (bestScaleLongPressTimer) {
            clearTimeout(bestScaleLongPressTimer);
          }
          // 设置新的定时器
          bestScaleLongPressTimer = setTimeout(() => {
            // 长按触发，重置最佳比例
            resetBestScale();
          }, BEST_SCALE_LONG_PRESS_DURATION);
        });

        bestScaleBtn.addEventListener("mouseup", () => {
          // 清除定时器
          if (bestScaleLongPressTimer) {
            clearTimeout(bestScaleLongPressTimer);
            bestScaleLongPressTimer = null;
          }
        });

        bestScaleBtn.addEventListener("mouseleave", () => {
          // 清除定时器
          if (bestScaleLongPressTimer) {
            clearTimeout(bestScaleLongPressTimer);
            bestScaleLongPressTimer = null;
          }
        });

        // 重置最佳比例
        async function resetBestScale() {
          if (!currentPage) return;

          // 计算全屏显示比例
          const rect = canvasArea.getBoundingClientRect();
          let canvasW = rect.width;
          let canvasH = rect.height;
          if (canvasW < 10) canvasW = window.innerWidth;
          if (canvasH < 10) canvasH = window.innerHeight;
          canvasW = canvasW * dpr;
          canvasH = canvasH * dpr;
          const viewport = currentPage.getViewport({ scale: 1 });
          const imgW = viewport.width * dpr;
          const imgH = viewport.height * dpr;
          const fullScreenScale = Math.min(canvasW / imgW, canvasH / imgH);

          // 重置最佳比例为全屏显示比例
          localStorage.setItem(
            `easyPdfBestScale_${currentFileName}`,
            fullScreenScale.toString()
          );
          // 清除用户保存标记
          localStorage.setItem(
            `easyPdfUserSavedBestScale_${currentFileName}`,
            "false"
          );

          // 更新最佳比例的暂存渲染结果
          const bestScaleViewport = currentPage.getViewport({
            scale: fullScreenScale * dpr,
          });
          const tempOffscreenCanvas = document.createElement("canvas");
          tempOffscreenCanvas.width = bestScaleViewport.width;
          tempOffscreenCanvas.height = bestScaleViewport.height;
          const tempOffCtx = tempOffscreenCanvas.getContext("2d");
          await currentPage.render({
            canvasContext: tempOffCtx,
            viewport: bestScaleViewport,
            background: isCadPDF ? "transparent" : "white",
          }).promise;
          // 更新最佳比例的暂存渲染结果
          bestScaleRender = document.createElement("canvas");
          bestScaleRender.width = tempOffscreenCanvas.width;
          bestScaleRender.height = tempOffscreenCanvas.height;
          const bestCtx = bestScaleRender.getContext("2d");
          bestCtx.drawImage(tempOffscreenCanvas, 0, 0);

          // 更新图标为黑色空心
          const icon = document.getElementById("bestScaleIcon");
          if (icon) {
            icon.style.stroke = "#333333";
            icon.style.fill = "none";
          }

          showToast("已重置最佳比例");
          console.log(`已重置最佳比例为全屏显示比例: ${fullScreenScale}`);
        }

        // 存储最佳比例的处理函数
        async function handleSaveBestScale() {
          if (locked) return;

          isBestScaleSaved = true;

          // 更新图标为红色实心
          const icon = document.getElementById("bestScaleIcon");
          if (icon) {
            icon.style.stroke = "#ff4d4f";
            icon.style.fill = "#ff4d4f";
          }

          // 存储当前比例为最佳比例到本地（标记为用户保存）
          localStorage.setItem(`easyPdfBestScale_${currentFileName}`, scale);
          localStorage.setItem(
            `easyPdfUserSavedBestScale_${currentFileName}`,
            "true"
          );

          // 重新计算并更新最佳比例的暂存渲染结果
          if (currentPage && offscreenCanvas) {
            const bestScaleViewport = currentPage.getViewport({
              scale: scale * dpr,
            });
            const tempOffscreenCanvas = document.createElement("canvas");
            tempOffscreenCanvas.width = bestScaleViewport.width;
            tempOffscreenCanvas.height = bestScaleViewport.height;
            const tempOffCtx = tempOffscreenCanvas.getContext("2d");
            await currentPage.render({
              canvasContext: tempOffCtx,
              viewport: bestScaleViewport,
              background: isCadPDF ? "transparent" : "white",
            }).promise;
            // 更新最佳比例的暂存渲染结果
            bestScaleRender = document.createElement("canvas");
            bestScaleRender.width = tempOffscreenCanvas.width;
            bestScaleRender.height = tempOffscreenCanvas.height;
            const bestCtx = bestScaleRender.getContext("2d");
            bestCtx.drawImage(tempOffscreenCanvas, 0, 0);
          }

          // 如果用户已登录，同步到Supabase
          if (isLoggedIn) {
            try {
              await syncBestScaleToSupabase(scale);
              showToast("已存储最佳比例（已同步到云端）");
            } catch (error) {
              console.error("同步最佳比例失败:", error);
              showToast("已存储最佳比例（仅本地）");
            }
          } else {
            showToast("已存储最佳比例（仅本地）");
          }

          // 更新状态
          isUsingBestScale = true;
          // 检查最佳比例状态
          checkBestScaleStatus();
        }

        // 鼠标双击事件
        bestScaleBtn.addEventListener("dblclick", handleSaveBestScale);

        // 触摸事件处理 - 同时支持双击保存和长按重置
        let lastBestScaleTouchTime = 0;
        let bestScaleTouchTimer = null;
        const BEST_SCALE_DOUBLE_TAP_DELAY = 300;

        // 触摸开始事件
        bestScaleBtn.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            e.stopPropagation();

            // 添加视觉反馈效果
            bestScaleBtn.style.transform = "scale(0.94)";

            const currentTime = new Date().getTime();
            const tapLength = e.touches.length;

            if (tapLength === 1) {
              if (
                currentTime - lastBestScaleTouchTime <
                BEST_SCALE_DOUBLE_TAP_DELAY
              ) {
                // 检测到触摸双击 - 保存最佳比例
                if (bestScaleTouchTimer) {
                  clearTimeout(bestScaleTouchTimer);
                  bestScaleTouchTimer = null;
                }
                handleSaveBestScale();
              } else {
                // 可能是单击或长按，设置长按定时器
                bestScaleTouchTimer = setTimeout(() => {
                  // 长按触发，重置最佳比例
                  resetBestScale();
                  bestScaleTouchTimer = null;
                }, BEST_SCALE_LONG_PRESS_DURATION);
              }
              lastBestScaleTouchTime = currentTime;
            }
          },
          { passive: false, capture: true }
        );

        // 触摸结束事件
        bestScaleBtn.addEventListener(
          "touchend",
          (e) => {
            e.stopPropagation();
            // 恢复按钮视觉效果
            bestScaleBtn.style.transform = "";

            // 清除长按定时器
            if (bestScaleTouchTimer) {
              clearTimeout(bestScaleTouchTimer);
              bestScaleTouchTimer = null;
            }
          },
          { passive: true, capture: true }
        );

        // 触摸取消事件
        bestScaleBtn.addEventListener(
          "touchcancel",
          (e) => {
            e.stopPropagation();
            // 恢复按钮视觉效果
            bestScaleBtn.style.transform = "";

            lastBestScaleTouchTime = 0;
            if (bestScaleTouchTimer) {
              clearTimeout(bestScaleTouchTimer);
              bestScaleTouchTimer = null;
            }
          },
          { passive: true, capture: true }
        );

        // 显示提示信息
        function showToast(message) {
          const toast = document.createElement("div");
          toast.className = "toast";
          toast.textContent = message;
          document.body.appendChild(toast);

          setTimeout(() => {
            toast.remove();
          }, 2000);
        }

        // 同步最佳比例到Supabase
        async function syncBestScaleToSupabase(scaleValue) {
          if (!isLoggedIn) throw new Error("用户未登录");
          if (!currentFileName) throw new Error("未打开PDF文件");

          const {
            data: { user },
          } = await supabaseClient.auth.getUser();
          if (!user) throw new Error("认证状态失效");

          // 存储最佳比例到用户配置表
          const { error } = await supabaseClient.from("user_settings").upsert(
            {
              user_id: user.id,
              file_name: currentFileName,
              best_scale: scaleValue,
              updated_at: new Date().toISOString(),
            },
            {
              onConflict: "user_id,file_name",
            }
          );

          if (error) {
            throw error;
          }
        }

        function showControlBar() {
          // 移除已存在的控制条
          if (controlBar) {
            controlBar.remove();
          }

          // 创建控制条
          controlBar = document.createElement("div");
          controlBar.className = "scale-control-bar";
          controlBar.innerHTML = `
            <div class="control-bar-handle" style="left: 50%;"></div>
          `;

          document.body.appendChild(controlBar);

          // 定位控制条
          const rect = scaleInput.getBoundingClientRect();
          controlBar.style.left = `${rect.left}px`;
          controlBar.style.top = `${rect.bottom + 10}px`;
          controlBar.style.width = `${rect.width}px`;

          // 获取当前缩放值的小数部分（0-10）
          const currentScale = scale * 100;
          const integerPart = Math.floor(currentScale);
          const decimalPart = Math.round((currentScale - integerPart) * 10);
          controlBarValue = decimalPart;

          // 更新控制条位置
          updateControlBarPosition();

          // 绑定控制条事件
          const handle = controlBar.querySelector(".control-bar-handle");
          let isDragging = false;

          handle.addEventListener("mousedown", (e) => {
            e.preventDefault();
            isDragging = true;
          });

          handle.addEventListener("touchstart", (e) => {
            e.preventDefault();
            isDragging = true;
          });

          document.addEventListener("mousemove", (e) => {
            if (isDragging) {
              updateControlBarValue(e.clientX);
            }
          });

          document.addEventListener("touchmove", (e) => {
            if (isDragging) {
              updateControlBarValue(e.touches[0].clientX);
            }
          });

          document.addEventListener("mouseup", () => {
            isDragging = false;
          });

          document.addEventListener("touchend", () => {
            isDragging = false;
          });

          // 点击控制条外部关闭
          setTimeout(() => {
            document.addEventListener("click", closeControlBar);
          }, 100);
        }

        function updateControlBarPosition() {
          const handle = controlBar.querySelector(".control-bar-handle");
          const position = (controlBarValue / 10) * 100;
          handle.style.left = `${position}%`;
        }

        function updateControlBarValue(clientX) {
          const rect = controlBar.getBoundingClientRect();
          let position = (clientX - rect.left) / rect.width;
          position = Math.max(0, Math.min(1, position));
          controlBarValue = Math.round(position * 10);
          updateControlBarPosition();
          updateScaleFromControlBar();
        }

        function updateScaleFromControlBar() {
          const currentScale = scale * 100;
          const integerPart = Math.floor(currentScale);
          const newScale = integerPart + controlBarValue / 10;
          scaleInput.textContent = `${newScale.toFixed(1)}%`;
          // 直接调用缩放方法
          scaleAtPoint(newScale / 100, canvas.width / 2, canvas.height / 2);
        }

        function closeControlBar(e) {
          if (
            controlBar &&
            !controlBar.contains(e.target) &&
            e.target !== scaleInput
          ) {
            controlBar.remove();
            controlBar = null;
            document.removeEventListener("click", closeControlBar);
          }
        }

        // 为historyBtn添加点击事件处理
        historyBtn.addEventListener("click", (e) => {
          if (!isLoggedIn) {
            showLoginOverlay();
            return;
          }
          toggleHistoryMenu();
        });
        fullscreenBtn.addEventListener("click", () => {
          if (locked) return;
          if (!isLoggedIn) {
            showLoginOverlay();
            return;
          }
          toggleFullscreen();
        });
        // 重置按钮：切换最佳比例和全内容可看比例（带平滑动画）
        let isAnimating = false;
        resetBtn.addEventListener("click", async () => {
          if (locked || isAnimating) return;
          if (!isLoggedIn) {
            showLoginOverlay();
            return;
          }
          if (!currentPage) return;

          isAnimating = true;
          const bestScale = localStorage.getItem(
            `easyPdfBestScale_${currentFileName}`
          );
          const icon = document.getElementById("bestScaleIcon");

          // 计算全内容可看比例（全局比例）
          const contentVisibleScale = calculateResetScale();

          if (bestScale) {
            const savedBestScale = parseFloat(bestScale);
            // 检查当前是否处于最佳比例状态
            const isCurrentBestScale =
              Math.abs(scale - savedBestScale) < BEST_SCALE_THRESHOLD;

            // 检查最佳比例和全部内容显示比例是否相等，且当前比例为全屏显示比例
            const isBestScaleEqualContentScale =
              Math.abs(savedBestScale - contentVisibleScale) <
              BEST_SCALE_THRESHOLD;
            const isCurrentFullContentScale =
              Math.abs(scale - contentVisibleScale) < BEST_SCALE_THRESHOLD;

            if (isBestScaleEqualContentScale && isCurrentFullContentScale) {
              // 最佳比例和全部内容显示比例相等，且当前比例为全屏显示比例，不进行动画
              isAnimating = false;
              return;
            }

            if (isCurrentBestScale) {
              // 从最佳比例切换到全局比例
              await animateScale(contentVisibleScale, (progress) => {
                if (icon) {
                  // 从红色实心渐变到黑色空心
                  const r = Math.round(255 + (51 - 255) * progress);
                  const g = Math.round(77 + (51 - 77) * progress);
                  const b = Math.round(79 + (51 - 79) * progress);
                  const fillOpacity = 1 - progress;
                  icon.style.stroke = `rgb(${r}, ${g}, ${b})`;
                  icon.style.fill = `rgba(255, 77, 79, ${fillOpacity})`;
                }
              });
              // 确保最终状态为黑色空心
              if (icon) {
                icon.style.stroke = "#333333";
                icon.style.fill = "none";
              }
            } else {
              // 从全局比例切换到最佳比例
              await animateScale(savedBestScale, (progress) => {
                if (icon) {
                  // 从黑色空心渐变到红色实心
                  const r = Math.round(51 + (255 - 51) * progress);
                  const g = Math.round(51 + (77 - 51) * progress);
                  const b = Math.round(51 + (79 - 51) * progress);
                  const fillOpacity = progress;
                  icon.style.stroke = `rgb(${r}, ${g}, ${b})`;
                  icon.style.fill = `rgba(255, 77, 79, ${fillOpacity})`;
                }
              });
              // 确保最终状态为红色实心
              if (icon) {
                icon.style.stroke = "#ff4d4f";
                icon.style.fill = "#ff4d4f";
              }
            }
          } else {
            // 没有最佳比例，不进行动画
            isAnimating = false;
            return;
          }
          isAnimating = false;
        });

        // 计算全内容可看比例
        function calculateResetScale() {
          if (!currentPage) return 1;
          const rect = canvasArea.getBoundingClientRect();
          let canvasW = rect.width;
          let canvasH = rect.height;
          if (canvasW < 10) canvasW = window.innerWidth;
          if (canvasH < 10) canvasH = window.innerHeight;
          canvasW = canvasW * dpr;
          canvasH = canvasH * dpr;
          const viewport = currentPage.getViewport({ scale: 1 });
          const imgW = viewport.width * dpr;
          const imgH = viewport.height * dpr;
          let newScale = Math.min(canvasW / imgW, canvasH / imgH);
          return Math.min(20, newScale);
        }

        // 平滑缩放动画
        async function animateScale(targetScale, onProgress) {
          const startScale = scale;
          const startOffsetX = offsetX;
          const startOffsetY = offsetY;

          // 根据缩放倍数动态计算动画时间
          const scaleRatio = Math.abs(targetScale / startScale);
          const scaleFactor = Math.log(scaleRatio) / Math.log(2); // 使用对数来计算缩放的"倍数"
          const baseDuration = 300; // 基础动画时间
          const maxDuration = 800; // 最大动画时间
          const minDuration = 200; // 最小动画时间

          // 计算动画时间：小幅度缩放时间短，大幅度缩放时间长
          let duration = baseDuration + Math.abs(scaleFactor) * 50;
          duration = Math.max(minDuration, Math.min(maxDuration, duration));

          // 统一放大两倍，确保动画有足够的时间完成过渡
          duration *= 2;

          const startTime = performance.now();

          // 确保有完整的离屏渲染结果
          if (!offscreenCanvas) {
            await refreshRender();
          }

          // 确定动画类型
          let animationType = "normal";
          const contentVisibleScale = calculateResetScale();
          const isStartFullContent =
            Math.abs(startScale - contentVisibleScale) < BEST_SCALE_THRESHOLD;
          const isTargetFullContent =
            Math.abs(targetScale - contentVisibleScale) < BEST_SCALE_THRESHOLD;
          const bestScale = localStorage.getItem(
            `easyPdfBestScale_${currentFileName}`
          );
          const savedBestScale = bestScale
            ? parseFloat(bestScale)
            : contentVisibleScale * 2;
          const isStartBestScale =
            Math.abs(startScale - savedBestScale) < BEST_SCALE_THRESHOLD;
          const isTargetBestScale =
            Math.abs(targetScale - savedBestScale) < BEST_SCALE_THRESHOLD;

          if (isStartFullContent && isTargetBestScale) {
            animationType = "fullToBest";
          } else if (isStartBestScale && isTargetFullContent) {
            animationType = "bestToFull";
          } else if (
            !isStartBestScale &&
            !isStartFullContent &&
            isTargetBestScale
          ) {
            animationType = "anyToBest";
          }

          return new Promise((resolve) => {
            function animate(currentTime) {
              const elapsed = currentTime - startTime;
              const progress = Math.min(elapsed / duration, 1);

              // 使用easeOutCubic缓动函数，使动画先快后慢
              const easeProgress = 1 - Math.pow(1 - progress, 3);

              // 计算当前缩放比例
              const currentScale =
                startScale + (targetScale - startScale) * easeProgress;

              // 清除画布
              ctx.clearRect(0, 0, canvas.width, canvas.height);

              // 计算当前偏移量（基于完整PDF页面）
              const centerX = canvas.width / 2;
              const centerY = canvas.height / 2;

              // 使用不同的渲染策略
              if (
                (animationType === "fullToBest" ||
                  animationType === "bestToFull" ||
                  animationType === "anyToBest") &&
                fullContentRender
              ) {
                // 当使用特殊动画类型且有fullContentRender时，使用特殊渲染方式
                try {
                  const currentRenderScale = currentScale / contentVisibleScale;
                  const fullWidth =
                    fullContentRender.width * currentRenderScale;
                  const fullHeight =
                    fullContentRender.height * currentRenderScale;

                  // 计算绘制位置（以屏幕中心为锚点）
                  const drawX = centerX - fullWidth / 2;
                  const drawY = centerY - fullHeight / 2;

                  // 绘制缩放后的内容
                  ctx.drawImage(
                    fullContentRender,
                    drawX,
                    drawY,
                    fullWidth,
                    fullHeight
                  );
                } catch (e) {
                  console.error("动画渲染失败", e);
                }

                // 提前开始平滑过渡到最佳比例渲染结果（仅在向最佳比例过渡时）
                if (
                  (animationType === "fullToBest" ||
                    animationType === "anyToBest") &&
                  progress > 0.7 &&
                  bestScaleRender
                ) {
                  try {
                    // 计算透明度，从0逐渐增加到1，使用更快速的过渡
                    const alpha = (progress - 0.7) / 0.3;
                    // 使用缓动函数使透明度变化更自然
                    const easedAlpha = 1 - Math.pow(1 - alpha, 3);
                    ctx.globalAlpha = easedAlpha;

                    const bestWidth = bestScaleRender.width;
                    const bestHeight = bestScaleRender.height;

                    // 计算绘制位置（以屏幕中心为锚点）
                    const drawX = centerX - bestWidth / 2;
                    const drawY = centerY - bestHeight / 2;

                    // 绘制最佳比例的内容
                    ctx.drawImage(
                      bestScaleRender,
                      drawX,
                      drawY,
                      bestWidth,
                      bestHeight
                    );

                    // 重置透明度
                    ctx.globalAlpha = 1;
                  } catch (e) {
                    console.error("动画渲染失败", e);
                  }
                }
              } else {
                // 其他情况，使用默认渲染方式
                // 使用完整的离屏渲染结果绘制
                if (offscreenCanvas && currentPage) {
                  try {
                    // 计算当前缩放因子
                    const currentRenderScale = currentScale * dpr;
                    const viewport = currentPage.getViewport({ scale: 1 });
                    const fullWidth = viewport.width * currentRenderScale;
                    const fullHeight = viewport.height * currentRenderScale;

                    // 计算绘制位置（以屏幕中心为锚点）
                    const drawX = centerX - fullWidth / 2;
                    const drawY = centerY - fullHeight / 2;

                    // 绘制完整的缩放后的内容
                    ctx.drawImage(
                      offscreenCanvas,
                      drawX,
                      drawY,
                      fullWidth,
                      fullHeight
                    );
                  } catch (e) {
                    console.error("动画渲染失败", e);
                  }
                }
              }

              // 更新缩放按钮显示（使用当前动画比例，不触发渲染）
              scaleInput.textContent = `${(currentScale * 100).toFixed(1)}%`;

              // 调用进度回调函数
              if (onProgress) {
                onProgress(easeProgress);
              }

              if (progress < 1) {
                requestAnimationFrame(animate);
              } else {
                // 动画完成，更新全局变量并渲染最终结果
                scale = targetScale;

                // 计算最终偏移量（以PDF文件中心为锚点）
                if (currentPage) {
                  try {
                    const viewport = currentPage.getViewport({ scale: 1 });
                    const pageWidth = viewport.width;
                    const pageHeight = viewport.height;
                    const pdfCenterX = (pageWidth * targetScale * dpr) / 2;
                    const pdfCenterY = (pageHeight * targetScale * dpr) / 2;
                    const screenCenterX = canvas.width / 2;
                    const screenCenterY = canvas.height / 2;
                    offsetX = screenCenterX - pdfCenterX;
                    offsetY = screenCenterY - pdfCenterY;
                  } catch (e) {
                    // 回退到屏幕中心锚点
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    offsetX =
                      centerX -
                      (centerX - startOffsetX) * (targetScale / startScale);
                    offsetY =
                      centerY -
                      (centerY - startOffsetY) * (targetScale / startScale);
                  }
                } else {
                  // 回退到屏幕中心锚点
                  const centerX = canvas.width / 2;
                  const centerY = canvas.height / 2;
                  offsetX =
                    centerX -
                    (centerX - startOffsetX) * (targetScale / startScale);
                  offsetY =
                    centerY -
                    (centerY - startOffsetY) * (targetScale / startScale);
                }

                // 渲染最终清晰结果，立即执行，避免延迟
                refreshRender().then(() => {
                  // 检查最佳比例状态
                  checkBestScaleStatus();
                  resolve();
                });
              }
            }

            requestAnimationFrame(animate);
          });
        }
        fileBtn.addEventListener("click", () => {
          if (locked) return;
          if (!isLoggedIn) {
            showLoginOverlay();
            return;
          }
          // 记录当前全屏状态，文件选择器关闭后恢复
          const wasFullscreen = !!document.fullscreenElement;
          fileInput.click();
          // 如果在全屏状态，保持全屏
          if (wasFullscreen && !document.fullscreenElement) {
            document.documentElement.requestFullscreen();
          }
        });
        fileInput.addEventListener("change", (e) => {
          if (locked) return;
          if (e.target.files && e.target.files[0])
            openLocalFile(e.target.files[0]);
        });

        // 锁定按钮
        lockBtnEl.addEventListener("click", () => {
          if (!isLoggedIn) {
            showLoginOverlay();
            return;
          }
          toggleLock();
        });

        // 语音按钮：已移除所有事件绑定

        // 初始显示
        resizeCanvas();
        drawWelcomeMessage();
        // 初始检查最佳比例状态
        checkBestScaleStatus();
        // 默认显示顶部工具栏和底部工具栏（同步弹出）
        document.getElementById("topBar").classList.add("show");
        document.getElementById("bottomToolbar").classList.add("show");

        // 不自动加载历史文件，等待用户主动点击按钮
        // const history = await fetchHistoryList();
        // if (history.length > 0) {
        //   await loadFromSupabase(history[0].storage_path, history[0].file_name);
        // }

        // 初始化手柄按钮事件
        initControllerButton();

        // 页面刷新前保存状态到 Session Storage
        window.addEventListener("beforeunload", () => {
          const tempState = {
            scale: scale,
            offsetX: offsetX,
            offsetY: offsetY,
          };
          sessionStorage.setItem("easyPdfTempState", JSON.stringify(tempState));

          // 清理二维码缓存
          Object.keys(localStorage).forEach((key) => {
            if (key.startsWith("qrcode_")) {
              localStorage.removeItem(key);
            }
          });
          console.log("二维码缓存已清理");
        });
      }

      init();
    </script>
  </body>
</html>
