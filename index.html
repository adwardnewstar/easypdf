      // 发送消息到手柄（自动添加windowId）
      function sendToController(message) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          // 自动添加windowId到消息中
          const messageWithWindowId = {
            ...message,
            windowId: getCurrentWindowId(),
          };
          ws.send(JSON.stringify(messageWithWindowId));
          console.log("发送消息到手柄:", message.type);
        } else {
          console.warn("WebSocket未连接，无法发送消息:", message.type);
        }
      }

      // 记录上次发送图片的方向
      let lastSentOrientation = null;

      // 发送PDF图片数据的辅助函数
      function sendPdfImageData(
        imageData,
        pageWidth,
        pageHeight,
        phoneWidth,
        phoneHeight,
        orientation,
        viewportLeft,
        viewportTop,
        viewportWidth,
        viewportHeight
      ) {
        if (!imageData || imageData.length < 100) {
          console.error("无效的图片数据");
          return;
        }

        console.log("发送PDF图片，数据大小:", imageData.length, "字节");

        // 检查数据大小，如果太大则降低质量
        let finalImageData = imageData;
        let quality = 0.9;

        if (imageData.length > 2000000) {
          console.warn(
            "图片数据过大(" + imageData.length + "字节)，尝试降低质量"
          );
          quality = 0.7;
          // 注意：这里无法重新生成，因为没有canvas引用，直接发送原始数据
        }

        sendToController({
          type: "pdfImage",
          imageData: finalImageData,
          pageWidth: pageWidth,
          pageHeight: pageHeight,
          phoneWidth: phoneWidth,
          phoneHeight: phoneHeight,
          orientation: orientation,
          viewportLeft: viewportLeft,
          viewportTop: viewportTop,
          viewportWidth: viewportWidth,
          viewportHeight: viewportHeight,
          scale: scale,
          offsetX: offsetX / (window.devicePixelRatio || 1),
          offsetY: offsetY / (window.devicePixelRatio || 1),
        });
      }

      // 直接渲染PDF页面内容并发送给手机端（不根据手机屏幕尺寸适配）
      async function renderAndSendPDFImage(
        phoneWidth,
        phoneHeight,
        orientation
      ) {
        if (!currentPage) return;

        console.log("渲染PDF页面发送给手机端", "方向:", orientation);

        // 获取当前视口信息（用于发送给手机端）
        const viewport = currentPage.getViewport({ scale: 1 });
        const pageWidth = viewport.width;
        const pageHeight = viewport.height;

        console.log("PDF页面尺寸:", pageWidth, "x", pageHeight);

        // 获取设备像素比
        const dpr = window.devicePixelRatio || 1;

        // 计算视口在PDF页面上的位置和大小（使用当前缩放比例）
        const canvasWidth = window.innerWidth;
        const canvasHeight = window.innerHeight;
        const viewportLeft = -offsetX / dpr / scale;
        const viewportTop = -offsetY / dpr / scale;
        const viewportWidth = canvasWidth / scale;
        const viewportHeight = canvasHeight / scale;

        // 创建离屏canvas（使用自适应缩放比例，避免超大canvas）
        const renderCanvas = document.createElement("canvas");
        const renderCtx = renderCanvas.getContext("2d");

        if (!renderCtx) {
          console.error("无法创建canvas上下文");
          return;
        }

        // 计算最大canvas尺寸（避免内存不足）
        const maxCanvasSize = 4096; // 最大尺寸限制
        let renderScale = 1.0;

        // 根据页面尺寸计算合适的缩放比例
        const maxDimension = Math.max(pageWidth, pageHeight);
        if (maxDimension > maxCanvasSize) {
          renderScale = maxCanvasSize / maxDimension;
          console.log("页面尺寸过大，降低渲染比例:", renderScale);
        } else if (phoneWidth && phoneHeight) {
          // 如果有手机尺寸信息，使用合适的缩放比例
          const scaleByWidth = phoneWidth / pageWidth;
          const scaleByHeight = phoneHeight / pageHeight;
          renderScale = Math.min(scaleByWidth, scaleByHeight, 2.0);
        }

        // 设置canvas尺寸
        const canvasW = pageWidth * renderScale;
        const canvasH = pageHeight * renderScale;

        console.log(
          "渲染尺寸:",
          canvasW,
          "x",
          canvasH,
          "缩放比例:",
          renderScale
        );

        // 检查canvas尺寸是否在合理范围内
        if (canvasW > 8192 || canvasH > 8192) {
          console.error("canvas尺寸过大:", canvasW, "x", canvasH);
          return;
        }

        renderCanvas.width = canvasW * dpr;
        renderCanvas.height = canvasH * dpr;
        renderCtx.scale(dpr, dpr);

        // 清空画布（与手机端容器底色一致的背景色 #f5f5f5）
        renderCtx.fillStyle = "#f5f5f5";
        renderCtx.fillRect(0, 0, canvasW, canvasH);

        // 创建PDF视口（使用渲染比例）
        const renderViewport = currentPage.getViewport({
          scale: renderScale,
        });

        const renderContext = {
          canvasContext: renderCtx,
          viewport: renderViewport,
          enableWebGL: true,
          background: "#f5f5f5", // 设置与手机端容器一致的背景色
        };

        try {
          // 渲染整个PDF页面
          await currentPage.render(renderContext).promise;
        } catch (renderError) {
          console.error("PDF渲染失败:", renderError);
          // 尝试禁用WebGL重新渲染
          console.log("尝试禁用WebGL重新渲染");
          const renderContextNoWebGL = {
            canvasContext: renderCtx,
            viewport: renderViewport,
            enableWebGL: false,
            background: "#f5f5f5", // 设置与手机端容器一致的背景色
          };
          try {
            await currentPage.render(renderContextNoWebGL).promise;
          } catch (error2) {
            console.error("禁用WebGL后渲染仍然失败:", error2);
            return;
          }
        }

        // 在PDF渲染完成后，使用destination-over模式填充背景色
        // 确保所有透明区域都被填充为#f5f5f5，与手机端容器底色一致
        renderCtx.globalCompositeOperation = "destination-over";
        renderCtx.fillStyle = "#f5f5f5";
        renderCtx.fillRect(0, 0, canvasW, canvasH);
        renderCtx.globalCompositeOperation = "source-over";

        // 转换为图片数据发送（优先使用WebP格式，压缩率高）
        // 先尝试WebP格式（质量0.85），不支持则降级到JPEG
        let imageData = renderCanvas.toDataURL("image/webp", 0.85);

        // 检查WebP是否生成成功（某些旧浏览器不支持WebP）
        if (!imageData || imageData.length < 100 || imageData === "data:,") {
          console.log("WebP格式不支持，降级到JPEG格式");
          // 在转换为JPEG前，确保背景色正确填充
          renderCtx.globalCompositeOperation = "destination-over";
          renderCtx.fillStyle = "#f5f5f5";
          renderCtx.fillRect(0, 0, canvasW, canvasH);
          renderCtx.globalCompositeOperation = "source-over";

          imageData = renderCanvas.toDataURL("image/jpeg", 0.85);
        }

        // 检查图片数据是否有效
        if (!imageData || imageData.length < 100 || imageData === "data:,") {
          console.error("图片数据无效");
          return;
        }

        console.log(
          "发送PDF页面图片给手机端，数据大小:",
          imageData.length,
          "字节",
          "页面尺寸:",
          pageWidth,
          "x",
          pageHeight
        );

        // 检查数据大小，如果太大则降低质量
        // 使用较低的阈值（2MB）确保稳定传输
        let finalImageData = imageData;
        let quality = 0.85;

        if (imageData.length > 2000000) {
          // 超过2MB，降低质量
          console.warn(
            "图片数据过大(" + imageData.length + "字节)，尝试降低质量"
          );
          quality = 0.7;
          // 在转换前，确保背景色正确填充
          renderCtx.globalCompositeOperation = "destination-over";
          renderCtx.fillStyle = "#f5f5f5";
          renderCtx.fillRect(0, 0, canvasW, canvasH);
          renderCtx.globalCompositeOperation = "source-over";

          finalImageData =
            renderCanvas.toDataURL("image/webp", quality) ||
            renderCanvas.toDataURL("image/jpeg", quality);
          console.log("降低质量后数据大小:", finalImageData.length, "字节");
        }

        if (finalImageData.length > 4000000) {
          // 仍然超过4MB，再次降低质量
          console.warn(
            "图片仍然过大(" + finalImageData.length + "字节)，继续降低质量"
          );
          quality = 0.5;
          // 在转换前，确保背景色正确填充
          renderCtx.globalCompositeOperation = "destination-over";
          renderCtx.fillStyle = "#f5f5f5";
          renderCtx.fillRect(0, 0, canvasW, canvasH);
          renderCtx.globalCompositeOperation = "source-over";

          finalImageData =
            renderCanvas.toDataURL("image/webp", quality) ||
            renderCanvas.toDataURL("image/jpeg", quality);
          console.log("再次降低质量后数据大小:", finalImageData.length, "字节");
        }

        // 使用辅助函数发送图片数据
        sendPdfImageData(
          finalImageData,
          pageWidth,
          pageHeight,
          phoneWidth,
          phoneHeight,
          orientation,
          viewportLeft,
          viewportTop,
          viewportWidth,
          viewportHeight
        );
      }

      // 切换最佳视图
      function toggleBestView() {
        if (!currentPage) return;

        if (isUsingBestScale) {
          // 如果当前是最佳比例，切换回全屏显示
          const rect = canvasArea.getBoundingClientRect();
          let canvasW = rect.width;
          let canvasH = rect.height;
          if (canvasW < 10) canvasW = window.innerWidth;
          if (canvasH < 10) canvasH = window.innerHeight;
          canvasW = canvasW * dpr;
          canvasH = canvasH * dpr;
          const viewport = currentPage.getViewport({ scale: 1 });
          const imgW = viewport.width * dpr;
          const imgH = viewport.height * dpr;
          const fullScreenScale = Math.min(canvasW / imgW, canvasH / imgH);

          scale = fullScreenScale;
          updatePan();
          isUsingBestScale = false;
          checkBestScaleStatus();
        } else {
          // 如果当前不是最佳比例，切换到最佳比例
          setBestScale();
        }
      }

      // 重置最佳比例
      async function resetBestScale() {
        if (!currentPage) return;

        // 计算全屏显示比例
        const rect = canvasArea.getBoundingClientRect();
        let canvasW = rect.width;
        let canvasH = rect.height;
        if (canvasW < 10) canvasW = window.innerWidth;
        if (canvasH < 10) canvasH = window.innerHeight;
        canvasW = canvasW * dpr;
        canvasH = canvasH * dpr;
        const viewport = currentPage.getViewport({ scale: 1 });
        const imgW = viewport.width * dpr;
        const imgH = viewport.height * dpr;
        const fullScreenScale = Math.min(canvasW / imgW, canvasH / imgH);

        // 重置最佳比例为全屏显示比例
        localStorage.setItem(
          `easyPdfBestScale_${currentFileName}`,
          fullScreenScale.toString()
        );
        // 清除用户保存标记
        localStorage.setItem(
          `easyPdfUserSavedBestScale_${currentFileName}`,
          "false"
        );

        // 更新最佳比例的暂存渲染结果
        const bestScaleViewport = currentPage.getViewport({
          scale: fullScreenScale * dpr,
        });
        const tempOffscreenCanvas = document.createElement("canvas");
        tempOffscreenCanvas.width = bestScaleViewport.width;
        tempOffscreenCanvas.height = bestScaleViewport.height;
        const tempOffCtx = tempOffscreenCanvas.getContext("2d");
        await currentPage.render({
          canvasContext: tempOffCtx,
          viewport: bestScaleViewport,
          background: isCadPDF ? "transparent" : "white",
        }).promise;
        // 更新最佳比例的暂存渲染结果
        bestScaleRender = document.createElement("canvas");
        bestScaleRender.width = tempOffscreenCanvas.width;
        bestScaleRender.height = tempOffscreenCanvas.height;
        const bestCtx = bestScaleRender.getContext("2d");
        bestCtx.drawImage(tempOffscreenCanvas, 0, 0);

        // 更新图标为黑色空心
        const icon = document.getElementById("bestScaleIcon");
        if (icon) {
          icon.style.stroke = "#333333";
          icon.style.fill = "none";
        }

        showToast("已重置最佳比例");
        console.log(`已重置最佳比例为全屏显示比例: ${fullScreenScale}`);
      }

      // 设置最佳比例
      function setBestScale() {
        if (!currentPage) return;

        // 从本地存储获取最佳比例
        const savedBestScale = localStorage.getItem(
          `easyPdfBestScale_${currentFileName}`
        );
        if (savedBestScale) {
          scale = parseFloat(savedBestScale);
          updatePan();
          isUsingBestScale = true;
          checkBestScaleStatus();
        }
      }

      // 页面加载完成后初始化WebSocket和二维码
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(initWebSocket, 500);
        initQRCode();
      });

      // ==================== 辅助函数 ====================

      // 计算全内容显示比例（使整个PDF页面刚好适应屏幕）
      function calculateFitScale() {
        if (!currentPage) return 1.0;

        const viewport = currentPage.getViewport({ scale: 1 });
        const pageWidth = viewport.width;
        const pageHeight = viewport.height;

        // 获取屏幕尺寸（逻辑像素）
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;

        // 计算适应宽度和高度的缩放比例，取较小值
        const scaleX = screenWidth / pageWidth;
        const scaleY = screenHeight / pageHeight;

        return Math.min(scaleX, scaleY);
      }

      function showLoading(show, msg = "") {
        if (show) {
          loadingMask.style.display = "flex";
        } else {
          loadingMask.style.display = "none";
        }
        // 同步loading状态到手机端
        sendToController({
          type: "loading",
          show: show,
          message: msg,
        });
      }

      // 登录相关函数
      function showLoginOverlay() {
        const loginOverlay = document.getElementById("loginOverlay");
        loginOverlay.style.display = "flex";
        setTimeout(() => {
          loginOverlay.classList.add("show");
        }, 10);
      }

      function hideLoginOverlay() {
        const loginOverlay = document.getElementById("loginOverlay");
        loginOverlay.classList.remove("show");
        setTimeout(() => {
          loginOverlay.style.display = "none";
        }, 300);
      }

      async function login(email, password) {
        const loginError = document.getElementById("loginError");
        const loginButton = document.getElementById("loginButton");
        const originalButtonText = loginButton ? loginButton.textContent : "";

        loginError.textContent = "";

        // 修改按钮文本为"Please wait..."并添加动画
        let waitingAnimation = null;
        if (loginButton) {
          loginButton.textContent = "Please wait.";
          loginButton.disabled = true;

          // 添加等待动画：. -> .. -> ... -> .... -> ..... -> ...... -> 循环
          let dots = 1;
          waitingAnimation = setInterval(() => {
            dots = (dots % 6) + 1;
            loginButton.textContent = "Please wait" + ".".repeat(dots);
          }, 300);
        }

        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
          });

          if (error) {
            loginError.textContent = "登录失败：" + error.message;
            return false;
          }

          isLoggedIn = true;
          hideLoginOverlay();

          // 发送登录状态到服务器，广播到所有连接的客户端
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(
              JSON.stringify({
                type: "loginStatus",
                isLoggedIn: true,
              })
            );
          }

          // 预加载历史记录
          fetchHistoryList().then((items) => {
            cachedHistoryList = items;
          });

          // 登录成功后重新初始化手柄按钮事件
          initControllerButton();

          return true;
        } catch (err) {
          loginError.textContent = "登录失败：" + err.message;
          return false;
        } finally {
          // 停止等待动画
          if (waitingAnimation) {
            clearInterval(waitingAnimation);
          }
          // 恢复按钮文本
          if (loginButton) {
            loginButton.textContent = originalButtonText;
            loginButton.disabled = false;
          }
        }
      }

      // 从Supabase加载最佳比例
      async function loadBestScaleFromSupabase() {
        if (!isLoggedIn || !currentFileName) return;

        const {
          data: { user },
        } = await supabaseClient.auth.getUser();
        if (!user) return;

        const { data, error } = await supabaseClient
          .from("user_settings")
          .select("best_scale")
          .eq("user_id", user.id)
          .eq("file_name", currentFileName)
          .single();

        if (error) {
          console.error("加载最佳比例失败:", error);
          return;
        }

        if (data && data.best_scale) {
          localStorage.setItem(
            `easyPdfBestScale_${currentFileName}`,
            data.best_scale
          );
        }
      }

      // 检查用户登录状态
      async function checkAuthStatus() {
        try {
          // 添加超时机制，避免网络请求阻塞
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 3000);

          const {
            data: { user },
          } = await supabaseClient.auth.getUser({
            signal: controller.signal,
          });

          clearTimeout(timeoutId);

          // 获取当前缓存的登录状态
          const cachedAuth = localStorage.getItem("easyPdfAuth");
          const cachedLoginStatus = cachedAuth ? JSON.parse(cachedAuth) : false;

          // 只有在缓存状态为未登录且服务器返回有用户时，才更新为已登录
          // 这样可以确保初始设置的未登录状态不会被覆盖
          if (!cachedLoginStatus && user) {
            isLoggedIn = true;
            localStorage.setItem("easyPdfAuth", "true");
          } else if (cachedLoginStatus && !user) {
            // 如果缓存状态为已登录但服务器返回无用户，更新为未登录
            isLoggedIn = false;
            localStorage.setItem("easyPdfAuth", "false");
          }
          // 其他情况保持当前状态不变

          if (user) {
            // 登录后同步最佳比例
            loadBestScaleFromSupabase();
            // 登录后清理历史记录，确保只保留5个文件
            limitStorageFiles();
          }
        } catch (err) {
          console.error("检查登录状态失败", err);
          // 出错时使用缓存的状态
          const cachedAuth = localStorage.getItem("easyPdfAuth");
          if (cachedAuth) {
            isLoggedIn = JSON.parse(cachedAuth);
          } else {
            isLoggedIn = false;
            localStorage.setItem("easyPdfAuth", "false");
          }
        }
      }

      // 更新缩放输入框
      function updateScaleInput() {
        scaleInput.textContent = `${(scale * 100).toFixed(1)}%`;
      }

      // 重新计算画布物理尺寸
      function resizeCanvas() {
        const rect = canvasArea.getBoundingClientRect();
        let w = rect.width,
          h = rect.height;
        if (w < 10) w = window.innerWidth;
        if (h < 10) h = window.innerHeight;
        const physicalW = Math.round(w * dpr);
        const physicalH = Math.round(h * dpr);
        if (canvas.width !== physicalW || canvas.height !== physicalH) {
          canvas.width = physicalW;
          canvas.height = physicalH;
          canvas.style.width = `${w}px`;
          canvas.style.height = `${h}px`;
          if (offscreenCanvas) {
            // 重新计算偏移量，保持PDF居中
            const viewport = currentPage.getViewport({ scale: 1 });
            const viewportWidth = viewport.width * scale * dpr;
            const viewportHeight = viewport.height * scale * dpr;
            offsetX = (canvas.width - viewportWidth) / 2;
            offsetY = (canvas.height - viewportHeight) / 2;
            drawCanvas();
          }

          // 视口尺寸改变时，重置fullContentRender和bestScaleRender
          // 这样动画时就会使用新的视口尺寸生成的渲染结果，避免跳动
          fullContentRender = null;
          bestScaleRender = null;
        }
      }

      // 绘制欢迎提示信息
      function drawWelcomeMessage() {
        if (offscreenCanvas) return; // 如果已加载PDF，不绘制提示

        ctx.fillStyle = "#f0f0f0";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // 将离屏画布绘制到主canvas
      function drawCanvas() {
        if (!offscreenCanvas || !ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(offscreenCanvas, offsetX, offsetY);

        // 更新视口导航窗口的焦点位置
        if (isNavVisible) {
          updateViewportNav();
        }
      }

      // 触发canvas渐入动画（用于新PDF加载时）
      function triggerCanvasFadeIn() {
        // 使用requestAnimationFrame在下一帧触发渐入
        requestAnimationFrame(() => {
          canvas.style.opacity = "1";
        });
      }

      // 刷新完整渲染（重新渲染PDF到离屏画布）
      async function refreshRender() {
        if (!currentPage) return;

        // 如果正在渲染，使用队列机制而不是直接返回
        if (isRendering) {
          // 设置一个标志，表示有新的渲染请求
          window.pendingRender = true;
          return;
        }

        isRendering = true;
        window.pendingRender = false;

        // 设置超时机制，确保isRendering不会永远为true
        const renderTimeout = setTimeout(() => {
          if (isRendering) {
            console.warn("渲染超时，强制重置渲染状态");
            isRendering = false;
            // 如果有待处理的渲染请求，执行它
            if (window.pendingRender) {
              window.pendingRender = false;
              refreshRender();
            }
          }
        }, 5000); // 5秒超时

        try {
          const viewport = currentPage.getViewport({ scale: 1 });
          const renderScale = scale * dpr;
          const w = viewport.width * renderScale;
          const h = viewport.height * renderScale;
          if (!offscreenCanvas)
            offscreenCanvas = document.createElement("canvas");
          offscreenCanvas.width = w;
          offscreenCanvas.height = h;
          const offCtx = offscreenCanvas.getContext("2d");
          const renderViewport = currentPage.getViewport({
            scale: renderScale,
          });

          // 使用 requestIdleCallback 将渲染操作分解，避免阻塞主线程
          await new Promise((resolve) => {
            const renderTask = () => {
              currentPage
                .render({
                  canvasContext: offCtx,
                  viewport: renderViewport,
                  background: isCadPDF ? "transparent" : "white",
                })
                .promise.then(() => resolve())
                .catch((renderErr) => {
                  console.error("渲染操作失败", renderErr);
                  resolve();
                });
            };

            // 使用 requestIdleCallback 如果可用，否则使用 setTimeout
            if (typeof requestIdleCallback !== "undefined") {
              requestIdleCallback(renderTask, { timeout: 100 });
            } else {
              setTimeout(renderTask, 0);
            }
          });

          drawCanvas();
          updateScaleInput();
          // 更新视口导航窗口
          if (isNavVisible) {
            updateViewportNav();
          }
        } catch (err) {
          console.error("渲染失败", err);
        } finally {
          clearTimeout(renderTimeout);
          isRendering = false;
          // 如果有待处理的渲染请求，执行它
          if (window.pendingRender) {
            window.pendingRender = false;
            // 使用 setTimeout 让出主线程
            setTimeout(() => refreshRender(), 0);
          }
        }
      }

      // 仅更新平移（不重新渲染）
      function updatePan() {
        if (offscreenCanvas) drawCanvas();
        // 更新视口导航窗口
        if (isNavVisible) {
          updateViewportIndicator();
        }
        // 发送视口信息到手柄
        sendViewportInfo();
      }

      // 发送视口信息到手柄
      function sendViewportInfo() {
        if (!currentPage) return;

        const viewport = currentPage.getViewport({ scale: 1 });
        const pageWidth = viewport.width;
        const pageHeight = viewport.height;

        // 获取canvas尺寸（使用window.innerWidth/innerHeight确保获取真实屏幕尺寸）
        // 不要使用canvasArea.getBoundingClientRect()，因为它可能被工具栏等元素遮挡导致尺寸不准确
        const canvasWidth = window.innerWidth;
        const canvasHeight = window.innerHeight;

        // 获取设备像素比（用于物理像素和逻辑像素转换）
        const dpr = window.devicePixelRatio || 1;

        // 计算视口在页面上的位置和大小（相对于PDF页面坐标）
        // offsetX 和 offsetY 是物理像素，需要先转换为逻辑像素（除以dpr），再除以缩放比例得到PDF页面坐标
        const viewportLeft = -offsetX / dpr / scale;
        const viewportTop = -offsetY / dpr / scale;

        // 视口大小 = 电脑端屏幕大小 / 缩放比例
        // 这是视口在PDF页面上的实际大小（PDF页面坐标）
        // 不限制视口大小，允许视口方框正常变大并溢出屏幕
        const viewportWidth = canvasWidth / scale;
        const viewportHeight = canvasHeight / scale;

        sendToController({
          type: "viewport",
          left: viewportLeft,
          top: viewportTop,
          width: viewportWidth,
          height: viewportHeight,
          pageWidth: pageWidth,
          pageHeight: pageHeight,
          scale: scale,
        });
      }

      // 重置视图为完整显示（不留边距）
      async function resetView(useSavedBestScale = true) {
        if (!currentPage || !offscreenCanvas) return;
        // 使用canvasArea的实际尺寸计算缩放比例
        const rect = canvasArea.getBoundingClientRect();
        let canvasW = rect.width || window.innerWidth;
        let canvasH = rect.height || window.innerHeight;
        // 转换为物理像素
        canvasW = canvasW * dpr;
        canvasH = canvasH * dpr;
        // 使用PDF页面的实际尺寸计算缩放比例
        const viewport = currentPage.getViewport({ scale: 1 });
        const imgW = viewport.width * dpr;
        const imgH = viewport.height * dpr;
        let newScale = Math.min(canvasW / imgW, canvasH / imgH);
        newScale = Math.min(20, newScale);

        // 创建临时离屏画布用于计算和暂存渲染结果
        const tempOffscreenCanvas = document.createElement("canvas");
        const tempOffCtx = tempOffscreenCanvas.getContext("2d");

        // 渲染全内容显示比例
        const fullContentViewport = currentPage.getViewport({
          scale: newScale * dpr,
        });
        tempOffscreenCanvas.width = fullContentViewport.width;
        tempOffscreenCanvas.height = fullContentViewport.height;
        await currentPage.render({
          canvasContext: tempOffCtx,
          viewport: fullContentViewport,
          background: isCadPDF ? "transparent" : "white",
        }).promise;
        // 暂存全内容显示比例的渲染结果
        fullContentRender = document.createElement("canvas");
        fullContentRender.width = tempOffscreenCanvas.width;
        fullContentRender.height = tempOffscreenCanvas.height;
        const fullCtx = fullContentRender.getContext("2d");
        fullCtx.drawImage(tempOffscreenCanvas, 0, 0);

        // 检查是否有保存的最佳比例
        const bestScale = localStorage.getItem(
          `easyPdfBestScale_${currentFileName}`
        );
        let finalScale = newScale; // 默认使用全屏显示比例

        if (useSavedBestScale && bestScale) {
          const savedBestScale = parseFloat(bestScale);
          // 如果有保存的最佳比例，使用它
          console.log(`使用已保存的最佳比例: ${savedBestScale}`);
          finalScale = savedBestScale;

          // 渲染最佳比例的暂存结果，用于后续切换
          const bestScaleViewport = currentPage.getViewport({
            scale: savedBestScale * dpr,
          });
          tempOffscreenCanvas.width = bestScaleViewport.width;
          tempOffscreenCanvas.height = bestScaleViewport.height;
          await currentPage.render({
            canvasContext: tempOffCtx,
            viewport: bestScaleViewport,
            background: isCadPDF ? "transparent" : "white",
          }).promise;
          // 暂存最佳比例的渲染结果
          bestScaleRender = document.createElement("canvas");
          bestScaleRender.width = tempOffscreenCanvas.width;
          bestScaleRender.height = tempOffscreenCanvas.height;
          const bestCtx = bestScaleRender.getContext("2d");
          bestCtx.drawImage(tempOffscreenCanvas, 0, 0);
        } else {
          // 没有保存的最佳比例或不使用保存的最佳比例，使用全屏显示比例作为默认值
          console.log(`使用全屏显示比例: ${newScale}`);
        }

        // 设置为最终确定的比例
        scale = finalScale;
        // 计算居中偏移量
        const viewportWidth = viewport.width * finalScale * dpr;
        const viewportHeight = viewport.height * finalScale * dpr;
        offsetX = (canvas.width - viewportWidth) / 2;
        offsetY = (canvas.height - viewportHeight) / 2;
        // 等待渲染完成
        await refreshRender();
        // 检查最佳比例状态
        checkBestScaleStatus();
      }

      // 中心缩放
      async function scaleAtPoint(newScale, centerX, centerY) {
        if (!currentPage || locked) return;
        newScale = Math.min(20, newScale); // 统一为20倍放大
        if (Math.abs(newScale - scale) < 0.001) return;
        const oldScale = scale;
        const newOffX = centerX - (centerX - offsetX) * (newScale / oldScale);
        const newOffY = centerY - (centerY - offsetY) * (newScale / oldScale);
        scale = newScale;
        offsetX = newOffX;
        offsetY = newOffY;
        updateScaleInput();
        await refreshRender();
        // 检查最佳比例状态
        checkBestScaleStatus();
      }

      // ==================== PDF 加载核心 ====================

      // PDF缓存：key为storagePath，value为缓存的文件数据
      const pdfCache = new Map();

      async function loadPDFFromBuffer(buffer, fileName, storagePath = null) {
        // 检查登录状态
        if (!isLoggedIn) {
          showLoginOverlay();
          return;
        }
        try {
          showLoading(true, "Loading...");

          if (pdfDoc) pdfDoc.destroy?.();
          currentPage = null;
          offscreenCanvas = null;

          // 清除暂存的渲染结果
          fullContentRender = null;
          bestScaleRender = null;
          isCadPDF = false; // 重置CAD PDF检测结果
          // 设置当前文件名
          currentFileName = fileName;

          // 重置最佳比例按钮状态
          initBestScaleButton();

          // 从Supabase加载最佳比例
          if (isLoggedIn) {
            await loadBestScaleFromSupabase();
          }

          // 使用 setTimeout 将PDF加载操作分解，避免阻塞主线程
          await new Promise((resolve) => setTimeout(resolve, 0));

          console.log("=== PDF加载开始 ===");
          console.log("进度: 0% - 开始加载PDF");

          const task = pdfjsLib.getDocument({
            data: buffer,
            useSystemFonts: true,
          });

          console.log("进度: 20% - 解析PDF文档");
          pdfDoc = await task.promise;

          // 再次使用 setTimeout 让出主线程
          await new Promise((resolve) => setTimeout(resolve, 0));

          console.log("进度: 40% - 获取第一页");
          currentPage = await pdfDoc.getPage(1);
          scale = 1.0;
          offsetX = 0;
          offsetY = 0;

          // 分析是否是CAD转换的PDF
          console.log("进度: 60% - 分析是否是CAD PDF");
          const cadAnalysis = await analyzeIfCadPDF(currentPage);
          isCadPDF = cadAnalysis.isCadLikely;
          console.log("=== CAD PDF分析 ===");
          console.log("是否是CAD转换的PDF:", isCadPDF);
          console.log("置信度:", cadAnalysis.confidence + "%");
          console.log("判断理由:", cadAnalysis.reasons);

          console.log("进度: 100% - 加载完成");

          // 计算全内容显示比例（最小缩放比例）
          fitScale = calculateFitScale();
          console.log("全内容显示比例（最小缩放比例）:", fitScale);

          // 创建离屏画布并初始化
          const viewport = currentPage.getViewport({ scale: 1 });
          const renderScale = scale * dpr;
          const w = viewport.width * renderScale;
          const h = viewport.height * renderScale;
          offscreenCanvas = document.createElement("canvas");
          offscreenCanvas.width = w;
          offscreenCanvas.height = h;

          // 设置canvas为透明，准备渐入动画
          canvas.style.opacity = "0";
          void canvas.offsetHeight; // 触发重排

          // 直接调用 resetView，使用全屏显示比例（不使用保存的最佳比例）
          await resetView(false);
          showLoading(false);

          // 触发canvas渐入动画
          triggerCanvasFadeIn();

          // 关闭二维码容器
          const qrcodeContainer = document.getElementById(
            "mainQrcodeContainer"
          );
          if (qrcodeContainer) {
            qrcodeContainer.parentElement.style.display = "none";
          }

          // 安全地复制ArrayBuffer
          if (buffer instanceof ArrayBuffer) {
            try {
              currentArrayBuffer = new ArrayBuffer(buffer.byteLength);
              const srcArray = new Uint8Array(buffer);
              const destArray = new Uint8Array(currentArrayBuffer);
              destArray.set(srcArray);
            } catch (err) {
              console.warn("ArrayBuffer复制失败，使用原始buffer", err);
              currentArrayBuffer = buffer;
            }
          }
          currentStoragePath = storagePath;

          // 检查最佳比例状态
          checkBestScaleStatus();

          // 隐藏控制区域（二维码区域已移除）

          // 发送文件打开消息到手柄端（通知手机端有新文件）
          // 手机端会发送屏幕尺寸信息，然后电脑端发送渲染好的图片
          // 重置上次发送的方向，让手机端重新获取图片
          lastSentOrientation = null;

          sendToController({
            type: "fileOpened",
            fileName: fileName,
            hasFile: true,
          });
        } catch (err) {
          console.error("加载PDF失败", err);
          showLoading(false);
          // 静默失败，不显示提示
        }
      }

      // 从Supabase下载并加载（历史文件）
      async function loadFromSupabase(storagePath, fileName) {
        // 检查登录状态
        if (!isLoggedIn) {
          showLoginOverlay();
          return;
        }
        try {
          // 立即显示Loading提示
          showLoading(true, "Loading...");

          // 检查缓存
          if (pdfCache.has(storagePath)) {
            console.log("使用缓存的PDF:", storagePath);
            const cachedData = pdfCache.get(storagePath);
            // 创建buffer副本，避免detached ArrayBuffer问题
            // 使用Uint8Array复制整个buffer，确保得到完整的新buffer
            const uint8Array = new Uint8Array(cachedData.buffer);
            const bufferCopy = uint8Array.slice().buffer;
            await loadPDFFromBuffer(bufferCopy, fileName, storagePath);
            return;
          }

          const { data, error } = await supabaseClient.storage
            .from("PDFs")
            .download(storagePath);
          if (error) throw error;
          const buffer = await data.arrayBuffer();

          // 缓存文件数据（创建副本避免原始数据被修改）
          const cachedBuffer = new Uint8Array(buffer).slice().buffer;
          pdfCache.set(storagePath, {
            buffer: cachedBuffer,
            fileName: fileName,
            timestamp: Date.now(),
          });

          await loadPDFFromBuffer(buffer, fileName, storagePath);
        } catch (err) {
          console.error("历史文件加载失败", err);
          showLoading(false);
          // 静默失败，不弹窗
        }
      }

      // 本地文件上传（后台异步，带按钮反馈）
      async function uploadToSupabase(file, buffer) {
        // 检查登录状态
        if (!isLoggedIn) {
          return;
        }
        try {
          // 检查文件大小是否小于1MB
          if (file.size > 1024 * 1024) {
            console.warn("文件大小超过1MB，跳过上传");
            return;
          }

          const ext = file.name.split(".").pop();
          const storageName = `${Date.now()}_${Math.random()
            .toString(36)
            .substr(2)}.${ext}`;
          const { error: uploadErr } = await supabaseClient.storage
            .from("PDFs")
            .upload(storageName, file);
          if (uploadErr) throw uploadErr;

          // 插入历史记录
          const { error: insertErr } = await supabaseClient
            .from("pdf_history")
            .insert([
              {
                file_name: file.name,
                storage_path: storageName,
                size: file.size,
              },
            ]);
          if (insertErr) throw insertErr;

          // 检查并限制存储数量为5个
          await limitStorageFiles();

          // 更新缓存的历史记录
          fetchHistoryList().then((items) => {
            cachedHistoryList = items;
          });

          // 更新当前文件的存储路径（如果加载的是同一个文件）
          if (currentFileName === file.name) {
            currentStoragePath = storageName;
          }
        } catch (err) {
          console.error("上传失败", err);
        }
      }

      // 限制存储文件数量为5个，删除最旧的文件
      async function limitStorageFiles() {
        try {
          // 获取所有历史记录，按创建时间排序
          const { data, error } = await supabaseClient
            .from("pdf_history")
            .select("file_name, storage_path, created_at")
            .order("created_at", { ascending: true }); // 按时间升序，最旧的在前

          if (error) throw error;

          // 如果文件数量超过5个，删除最旧的
          if (data && data.length > 5) {
            const filesToDelete = data.slice(0, data.length - 5); // 保留最新的5个

            for (const file of filesToDelete) {
              // 从存储桶中删除文件
              const { error: deleteErr } = await supabaseClient.storage
                .from("PDFs")
                .remove([file.storage_path]);

              if (deleteErr) {
                console.error(`删除文件失败: ${file.storage_path}`, deleteErr);
                continue;
              }

              // 从历史表中删除记录
              const { error: removeErr } = await supabaseClient
                .from("pdf_history")
                .delete()
                .eq("storage_path", file.storage_path);

              if (removeErr) {
                console.error(
                  `删除历史记录失败: ${file.storage_path}`,
                  removeErr
                );
              }
            }
          }

          // 更新缓存的历史记录
          fetchHistoryList().then((items) => {
            cachedHistoryList = items;
          });
        } catch (err) {
          console.error("限制存储文件数量失败", err);
        }
      }

      // 打开本地文件
      async function openLocalFile(file) {
        if (!file) return;

        // 检查登录状态
        if (!isLoggedIn) {
          showLoginOverlay();
          return;
        }

        // 检查文件类型
        const fileType = file.type;
        const fileName = file.name;
        const fileExtension = fileName.split(".").pop().toLowerCase();

        // 验证是否为PDF文件
        if (fileType !== "application/pdf" && fileExtension !== "pdf") {
          console.warn("文件类型错误，只支持PDF文件");
          return;
        }

        try {
          const buffer = await file.arrayBuffer();
          await loadPDFFromBuffer(buffer, file.name);
          // 后台异步上传
          uploadToSupabase(file, buffer);
        } catch (err) {
          console.error("打开本地文件失败", err);
        }
      }

      // 重置当前文件
      async function resetCurrentFile() {
        if (!currentFileName) return;
        if (currentArrayBuffer) {
          await loadPDFFromBuffer(
            currentArrayBuffer,
            currentFileName,
            currentStoragePath
          );
          return;
        }
        // 尝试从Supabase重新下载
        if (currentStoragePath) {
          await loadFromSupabase(currentStoragePath, currentFileName);
        } else {
          // 如果没有存储路径，尝试从历史表中查找同名最新文件
          const list = await fetchHistoryList();
          const match = list.find((item) => item.file_name === currentFileName);
          if (match) {
            await loadFromSupabase(match.storage_path, currentFileName);
          }
        }
      }

      // ==================== 历史记录 ====================
      async function fetchHistoryList() {
        try {
          const { data, error } = await supabaseClient
            .from("pdf_history")
            .select("file_name, storage_path")
            .order("created_at", { ascending: false })
            .limit(5);
          if (error) throw error;
          return data || [];
        } catch (err) {
          console.error("获取历史失败", err);
          return [];
        }
      }

      // 显示/隐藏历史菜单（点击切换）
      let isMenuOpen = false;
      function toggleHistoryMenu() {
        if (isMenuOpen) {
          historyMenu.classList.remove("show");
          isMenuOpen = false;
          return;
        }

        // 清除所有自定义弹出框
        clearCustomAlerts();

        // 先显示菜单，然后在后台获取历史文件列表
        const btnRect = historyBtn.getBoundingClientRect();
        const topBarRect = topBar.getBoundingClientRect();
        // 所有设备：在功能栏下面展开
        historyMenu.style.top = `${topBarRect.bottom + 8}px`;
        historyMenu.style.left = `${btnRect.left}px`;

        // 显示加载状态
        historyMenu.innerHTML = "";
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "history-item";
        loadingDiv.textContent = "加载中...";
        historyMenu.appendChild(loadingDiv);

        // 显示菜单
        historyMenu.classList.add("show");
        isMenuOpen = true;

        // 后台获取历史文件列表（每次都重新获取，确保显示最新的历史记录）
        fetchHistoryList()
          .then((items) => {
            cachedHistoryList = items;
            renderHistoryMenu(items);
          })
          .catch((err) => {
            console.error("获取历史失败", err);
            historyMenu.innerHTML = "";
            const errorDiv = document.createElement("div");
            errorDiv.className = "history-item";
            errorDiv.textContent = "加载失败";
            historyMenu.appendChild(errorDiv);
          });

        // 点击外部关闭
        const closeHandler = (e) => {
          // 检查点击目标是否在历史按钮内（包括按钮内的图标）
          const isClickOnHistoryBtn = historyBtn.contains(e.target);
          if (!historyMenu.contains(e.target) && !isClickOnHistoryBtn) {
            historyMenu.classList.remove("show");
            isMenuOpen = false;
            document.removeEventListener("click", closeHandler);
          }
        };
        setTimeout(() => document.addEventListener("click", closeHandler), 10);
      }

      // 渲染历史记录菜单
      function renderHistoryMenu(items) {
        historyMenu.innerHTML = "";
        if (items.length === 0) {
          const div = document.createElement("div");
          div.className = "history-item";
          div.textContent = "暂无历史文件";
          historyMenu.appendChild(div);
        } else {
          items.forEach((item) => {
            const div = document.createElement("div");
            div.className = "history-item";
            div.textContent = item.file_name || "未命名文件";
            div.onclick = async (e) => {
              e.stopPropagation();
              // 移除所有历史菜单项的选中状态
              const historyItems =
                historyMenu.querySelectorAll(".history-item");
              historyItems.forEach((item) => {
                item.classList.remove("selected");
              });
              // 添加当前项的选中状态
              div.classList.add("selected");
              historyMenu.classList.remove("show");
              isMenuOpen = false;
              await loadFromSupabase(item.storage_path, item.file_name);
            };
            historyMenu.appendChild(div);
          });
        }
      }

      // ==================== 缩略图 ====================
      // 检查当前比例是否接近最佳比例
      const BEST_SCALE_THRESHOLD = 0.02; // 最佳比例阈值，当差异小于2%时认为处于最佳比例状态
      function checkBestScaleStatus() {
        const bestScale = localStorage.getItem(
          `easyPdfBestScale_${currentFileName}`
        );
        const icon = document.getElementById("bestScaleIcon");
        if (!bestScale || !icon || !currentPage) return;

        const currentScale = scale;
        const savedScale = parseFloat(bestScale);
        if (isNaN(savedScale)) return;

        const scaleDiff = Math.abs(currentScale - savedScale) / savedScale;

        if (scaleDiff < BEST_SCALE_THRESHOLD) {
          // 处于最佳比例状态，显示红色实心爱心
          icon.style.stroke = "#ff4d4f";
          icon.style.fill = "#ff4d4f";
          isUsingBestScale = true;
        } else {
          // 未处于最佳比例状态，显示黑色空心爱心
          icon.style.stroke = "#333333";
          icon.style.fill = "none";
          isUsingBestScale = false;
        }
      }

      // 切换视口导航窗口
      function toggleViewportNav() {
        if (!currentPage) return;

        isNavVisible = !isNavVisible;
        if (isNavVisible) {
          // 计算导航视口位置，确保距离工具栏的距离是响应式的
          const toolbar = document.querySelector(".top-bar");
          const toolbarHeight = toolbar ? toolbar.offsetHeight : 100;
          const margin = 20; // 边距值，确保上边缘距离工具栏下边缘的距离与左边缘距离屏幕左边的距离相等
          viewportNav.style.top = `${toolbarHeight + margin}px`;
          viewportNav.style.left = `${margin}px`;
          viewportNav.style.display = "block";
          updateViewportNav();
          // 设置长按触发标志，防止点击事件立即隐藏导航窗口
          isLongPressTriggered = true;
        } else {
          viewportNav.style.display = "none";
        }
      }

      // 导航窗口拖动功能
      let touchStartX = 0,
        touchStartY = 0; // 触摸起始位置

      // 鼠标事件
      navContent.addEventListener("mousedown", (e) => {
        // 单击后立即进入拖动状态
        isDraggingNav = true;
        navDragStartX = e.clientX;
        navDragStartY = e.clientY;
        const rect = viewportNav.getBoundingClientRect();
        navStartX = rect.left;
        navStartY = rect.top;
        document.body.style.userSelect = "none";
        // 添加拖动视觉反馈
        viewportNav.classList.add("long-press");
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDraggingNav) return;
        const newX = navStartX + (e.clientX - navDragStartX);
        const newY = navStartY + (e.clientY - navDragStartY);
        viewportNav.style.left = `${newX}px`;
        viewportNav.style.top = `${newY}px`;
      });

      document.addEventListener("mouseup", () => {
        isDraggingNav = false;
        document.body.style.userSelect = "";
        // 移除拖动视觉反馈
        viewportNav.classList.remove("long-press");
      });

      // 触摸事件
      navContent.addEventListener("touchstart", (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const currentTime = new Date().getTime();
        const touchTime = currentTime - lastTouchTime;
        if (touchTime < 300 && touchTime > 0) {
          // 双击，不进入拖动状态
          handleNavDoubleClick();
          lastTouchTime = 0; // 重置，避免连续触发
        } else {
          // 单击，进入拖动状态
          isDraggingNav = true;
          navDragStartX = touch.clientX;
          navDragStartY = touch.clientY;
          const rect = viewportNav.getBoundingClientRect();
          navStartX = rect.left;
          navStartY = rect.top;
          // 保存触摸起始位置
          touchStartX = touch.clientX;
          touchStartY = touch.clientY;
          // 添加拖动视觉反馈
          viewportNav.classList.add("long-press");
          lastTouchTime = currentTime;
        }
      });

      document.addEventListener("touchmove", (e) => {
        if (!isDraggingNav) return;
        e.preventDefault();
        const touch = e.touches[0];
        const newX = navStartX + (touch.clientX - navDragStartX);
        const newY = navStartY + (touch.clientY - navDragStartY);
        viewportNav.style.left = `${newX}px`;
        viewportNav.style.top = `${newY}px`;
      });

      document.addEventListener("touchend", () => {
        isDraggingNav = false;
        // 移除拖动视觉反馈
        viewportNav.classList.remove("long-press");
      });

      // 导航窗口焦点取消功能
      let isLongPressTriggered = false; // 是否是长按触发的导航窗口

      // 导航窗口双击放大切换效果
      let isNavEnlarged = false; // 导航窗口是否已放大
      let navOriginalWidth = 0; // 导航窗口原始宽度
      let navOriginalHeight = 0; // 导航窗口原始高度
      let lastTouchTime = 0; // 上次触摸时间

      // 处理鼠标双击事件
      navContent.addEventListener("dblclick", (e) => {
        e.stopPropagation(); // 阻止事件冒泡
        handleNavDoubleClick();
      });

      // 处理触摸双击事件
      navContent.addEventListener("touchstart", (e) => {
        e.stopPropagation(); // 阻止事件冒泡
        const currentTime = new Date().getTime();
        const touchTime = currentTime - lastTouchTime;
        if (touchTime < 300 && touchTime > 0) {
          // 双击
          handleNavDoubleClick();
        }
        lastTouchTime = currentTime;
      });

      function handleNavDoubleClick() {
        const rect = viewportNav.getBoundingClientRect();

        if (!isNavEnlarged) {
          // 保存原始尺寸
          navOriginalWidth = rect.width;
          navOriginalHeight = rect.height;

          // 放大为原尺寸的两倍，以左上角为固定中心点
          viewportNav.style.width = `${navOriginalWidth * 2}px`;
          viewportNav.style.height = `${navOriginalHeight * 2}px`;
        } else {
          // 恢复原始尺寸
          viewportNav.style.width = `${navOriginalWidth}px`;
          viewportNav.style.height = `${navOriginalHeight}px`;
        }

        // 切换放大状态
        isNavEnlarged = !isNavEnlarged;

        // 更新导航窗口内容
        updateViewportNav();
      }

      // 窗口大小变化时调整导航视口位置
      window.addEventListener("resize", () => {
        if (isNavVisible) {
          // 计算导航视口位置，确保距离工具栏的距离是响应式的
          const toolbar = document.querySelector(".top-bar");
          const toolbarHeight = toolbar ? toolbar.offsetHeight : 100;
          const margin = 20; // 边距值，确保上边缘距离工具栏下边缘的距离与左边缘距离屏幕左边的距离相等
          viewportNav.style.top = `${toolbarHeight + margin}px`;
          viewportNav.style.left = `${margin}px`;
          // 更新导航窗口内容
          updateViewportNav();
        }
      });

      // 语音按钮点击事件，切换导航视口显示状态

      // 更新视口导航窗口
      function updateViewportNav() {
        if (!currentPage || !navCtx) return;

        // 计算导航窗口的尺寸
        const navRect = navContent.getBoundingClientRect();
        const navWidth = navRect.width;
        const navHeight = navRect.height;

        // 设置导航画布的尺寸，使用设备像素比提高清晰度
        const deviceNavWidth = navWidth * dpr;
        const deviceNavHeight = navHeight * dpr;
        navCanvas.width = deviceNavWidth;
        navCanvas.height = deviceNavHeight;
        navCanvas.style.width = `${navWidth}px`;
        navCanvas.style.height = `${navHeight}px`;

        // 清空画布
        navCtx.clearRect(0, 0, deviceNavWidth, deviceNavHeight);

        if (fullContentRender) {
          // 计算缩放比例，保持原始比例
          const scaleX = deviceNavWidth / fullContentRender.width;
          const scaleY = deviceNavHeight / fullContentRender.height;
          const renderScale = Math.min(scaleX, scaleY);

          // 计算渲染位置，居中显示
          const renderWidth = fullContentRender.width * renderScale;
          const renderHeight = fullContentRender.height * renderScale;
          const renderX = (deviceNavWidth - renderWidth) / 2;
          const renderY = (deviceNavHeight - renderHeight) / 2;

          // 使用全显缩小的渲染结果，提高清晰度
          navCtx.drawImage(
            fullContentRender,
            0,
            0,
            fullContentRender.width,
            fullContentRender.height,
            renderX,
            renderY,
            renderWidth,
            renderHeight
          );

          // 更新视口指示器，显示焦点位置
          updateViewportIndicator(
            renderX / dpr,
            renderY / dpr,
            renderWidth / dpr,
            renderHeight / dpr
          );
        } else if (currentPage) {
          // 如果fullContentRender不存在，直接渲染PDF页面到导航画布
          const viewport = currentPage.getViewport({ scale: 1 });
          const scaleX = deviceNavWidth / viewport.width;
          const scaleY = deviceNavHeight / viewport.height;
          const renderScale = Math.min(scaleX, scaleY);
          const renderViewport = currentPage.getViewport({
            scale: renderScale,
          });

          const renderWidth = renderViewport.width;
          const renderHeight = renderViewport.height;
          const renderX = (deviceNavWidth - renderWidth) / 2;
          const renderY = (deviceNavHeight - renderHeight) / 2;

          // 渲染PDF页面到导航画布
          currentPage
            .render({
              canvasContext: navCtx,
              viewport: renderViewport,
              background: "white",
              renderIntent: "print",
            })
            .promise.then(() => {
              // 更新视口指示器，显示焦点位置
              updateViewportIndicator(
                renderX / dpr,
                renderY / dpr,
                renderWidth / dpr,
                renderHeight / dpr
              );
            });
        }
      }

      // 创建和管理透明网格线
      function createGridSystem() {
        // 检查是否已经存在网格容器
        let gridContainer = document.getElementById("grid-container");
        if (!gridContainer) {
          // 创建网格容器
          gridContainer = document.createElement("div");
          gridContainer.id = "grid-container";
          gridContainer.style.position = "fixed";
          gridContainer.style.top = "0";

          gridContainer.style.zIndex = "100";

          // 根据gridVisible状态设置显示属性
          gridContainer.style.display = gridVisible ? "block" : "none";
          document.body.appendChild(gridContainer);
          console.log("网格容器创建成功");
        } else {
          // 确保现有网格容器的显示状态与gridVisible一致
          gridContainer.style.display = gridVisible ? "block" : "none";
        }

        // 清除现有的网格线
        gridContainer.innerHTML = "";

        // 计算网格参数 - 统一使用屏幕分辨率高度作为基准
        const screenWidth = window.screen.width; // 使用屏幕分辨率
        const screenHeight = window.screen.height; // 使用屏幕分辨率
        const totalDivisions = 29; // 纵向（y方向）总共29份
        const baseUnit = screenHeight / totalDivisions; // 基础单位
        const majorLineSpacing = baseUnit * 4; // 粗线中心距（粗线间4等分）

        // 计算屏幕中心位置
        const centerX = screenWidth / 2;
        const centerY = screenHeight / 2;

        // 计算需要的网格数量（向正负方向扩展）
        const halfVerticalDivisions = Math.ceil(centerX / baseUnit);
        const halfHorizontalDivisions = Math.ceil(centerY / baseUnit);

        console.log(
          `网格参数: 屏幕宽度=${screenWidth}, 屏幕高度=${screenHeight}, 总划分=${totalDivisions}, 基础单位=${baseUnit}, 粗线中心距=${majorLineSpacing}, 中心X=${centerX}, 中心Y=${centerY}`
        );

        // 创建横向网格线 - 29份，每4份的分界线清晰，以屏幕中心为原点
        for (
          let i = -halfHorizontalDivisions;
          i <= halfHorizontalDivisions;
          i++
        ) {
          const y = centerY + i * baseUnit;

          // 确保y在屏幕范围内
          if (y >= 0 && y <= screenHeight) {
            const horizontalLine = document.createElement("div");
            horizontalLine.style.position = "absolute";
            horizontalLine.style.top = `${y}px`;
            horizontalLine.style.left = "0";
            horizontalLine.style.width = "100%";
            horizontalLine.style.height = "1px";

            // 每4份的分界线清晰（透明度0.85），其他线透明度0.15，颜色加深
            const isMajorLine = i % 4 === 0;
            const opacity = isMajorLine ? 0.85 : 0.15;
            horizontalLine.style.backgroundColor = `rgba(150, 150, 150, ${opacity})`;

            // z-index分布：细线100，粗线101，颜色102
            horizontalLine.style.zIndex = isMajorLine ? "101" : "100";
            gridContainer.appendChild(horizontalLine);
            console.log(
              `创建横向网格线 at y=${y}px, ${isMajorLine ? "主线条" : "次线条"}`
            );
          }
        }

        // 创建竖向网格线 - 基于y方向的基础单位，显示逻辑和y方向一致，以屏幕中心为原点
        for (let i = -halfVerticalDivisions; i <= halfVerticalDivisions; i++) {
          const x = centerX + i * baseUnit;

          // 确保x在屏幕范围内
          if (x >= 0 && x <= screenWidth) {
            const verticalLine = document.createElement("div");
            verticalLine.style.position = "absolute";
            verticalLine.style.left = `${x}px`;
            verticalLine.style.top = "0";
            verticalLine.style.height = "100%";
            verticalLine.style.width = "1px";

            // 每4份的分界线清晰（透明度0.85），其他线透明度0.15，颜色加深
            const isMajorLine = i % 4 === 0;
            const opacity = isMajorLine ? 0.85 : 0.15;
            verticalLine.style.backgroundColor = `rgba(150, 150, 150, ${opacity})`;

            // z-index分布：细线100，粗线101，颜色102
            verticalLine.style.zIndex = isMajorLine ? "101" : "100";
            gridContainer.appendChild(verticalLine);
            console.log(
              `创建竖向网格线 at x=${x}px, ${isMajorLine ? "主线条" : "次线条"}`
            );
          }
        }

        // 添加边缘填充
        // 计算边缘填充区域的高度/宽度（基于基础单位）
        const edgePadding = baseUnit;
        const FILL_TRANSITION =
          "transform 0.3s ease-out, opacity 0.3s ease-out";

        // 上边缘填充 - #22B14C（绿色）
        const topFill = document.createElement("div");
        topFill.className = "edge-fill top";
        topFill.style.position = "absolute";
        topFill.style.top = "0";
        topFill.style.left = "0";
        topFill.style.width = "100%";
        topFill.style.height = `${edgePadding}px`;
        topFill.style.backgroundColor = "#22B14C";
        topFill.style.opacity = "0";
        topFill.style.transform = "translateY(-100%)";
        topFill.style.transition = FILL_TRANSITION;
        topFill.style.zIndex = "102";
        gridContainer.appendChild(topFill);
        console.log(`创建上边缘填充，高度: ${edgePadding}px`);

        // 下边缘填充 - #FFF200（黄色）
        const bottomFill = document.createElement("div");
        bottomFill.className = "edge-fill bottom";
        bottomFill.style.position = "absolute";
        bottomFill.style.bottom = "0";
        bottomFill.style.left = "0";
        bottomFill.style.width = "100%";
        bottomFill.style.height = `${edgePadding}px`;
        bottomFill.style.backgroundColor = "#FFF200";
        bottomFill.style.opacity = "0";
        bottomFill.style.transform = "translateY(100%)";
        bottomFill.style.transition = FILL_TRANSITION;
        bottomFill.style.zIndex = "102";
        gridContainer.appendChild(bottomFill);
        console.log(`创建下边缘填充，高度: ${edgePadding}px`);

        // 左边缘填充 - #3F48CC（蓝色）
        const leftFill = document.createElement("div");
        leftFill.className = "edge-fill left";
        leftFill.style.position = "absolute";
        leftFill.style.top = "0";
        leftFill.style.left = "0";
        leftFill.style.width = `${edgePadding}px`;
        leftFill.style.height = "100%";
        leftFill.style.backgroundColor = "#3F48CC";
        leftFill.style.opacity = "0";
        leftFill.style.transform = "translateX(-100%)";
        leftFill.style.transition = FILL_TRANSITION;
        leftFill.style.zIndex = "102";
        gridContainer.appendChild(leftFill);
        console.log(`创建左边缘填充，宽度: ${edgePadding}px`);

        // 右边缘填充 - #ED1C24（红色）

        rightFill.style.zIndex = "102";
        gridContainer.appendChild(rightFill);
        console.log(`创建右边缘填充，宽度: ${edgePadding}px`);

        console.log("网格线创建完成");
      }

      // 分析路径是否是正方形
      function analyzePathForSquare(path, textBounds, searchRadius) {
        // 分析路径是否是正方形
        // 正方形通常由4个点组成：moveTo -> lineTo -> lineTo -> lineTo -> stroke
        if (path.length < 4) return null;

        // 提取路径中的点
        const points = [];
        for (const item of path) {
          if (
            item.op === pdfjsLib.OPS.moveTo ||
            item.op === pdfjsLib.OPS.lineTo
          ) {
            points.push({
              x: item.args[0],
              y: item.args[1],
            });
          }
        }

        // 至少需要4个点才能形成正方形
        if (points.length < 4) return null;

        // 计算边长
        const side1 = Math.sqrt(
          Math.pow(points[1].x - points[0].x, 2) +
            Math.pow(points[1].y - points[0].y, 2)
        );
        const side2 = Math.sqrt(
          Math.pow(points[2].x - points[1].x, 2) +
            Math.pow(points[2].y - points[1].y, 2)
        );
        const side3 = Math.sqrt(
          Math.pow(points[3].x - points[2].x, 2) +
            Math.pow(points[3].y - points[2].y, 2)
        );
        const side4 = Math.sqrt(
          Math.pow(points[0].x - points[3].x, 2) +
            Math.pow(points[0].y - points[3].y, 2)
        );

        // 检查边长是否相近（允许5%的误差）
        const sides = [side1, side2, side3, side4];
        const avgSide = sides.reduce((a, b) => a + b, 0) / 4;
        const maxSide = Math.max(...sides);
        const minSide = Math.min(...sides);

        if (maxSide / minSide > 1.05) return null; // 边长差异太大，不是正方形

        // 计算路径的边界框
        let minX = Infinity,
          maxX = -Infinity;
        let minY = Infinity,
          maxY = -Infinity;

        for (const point of points) {
          minX = Math.min(minX, point.x);
          maxX = Math.max(maxX, point.x);
          minY = Math.min(minY, point.y);
          maxY = Math.max(maxY, point.y);
        }

        const bounds = {
          x: minX,
          y: minY,
          width: maxX - minX,
          height: maxY - minY,
        };

        // 检查是否是正方形（宽高比接近1）
        const aspectRatio = bounds.width / bounds.height;
        if (aspectRatio < 0.8 || aspectRatio > 1.2) return null; // 放宽宽高比限制

        // 检查是否在文字附近
        let isNearText = true;
        let distance = 0;
        if (textBounds) {
          distance = calculateDistance(bounds, textBounds);
          isNearText = distance < searchRadius;
        }

        if (!isNearText) return null;

        console.log("找到路径绘制的正方形:", {
          points,
          sides,
          bounds,
          distance,
        });

        return {
          type: "path",
          bounds: bounds,
          distanceToText: distance,
          points: points,
          sides: sides,
        };
      }
